name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test
      - run: npm run build
      - run: npm run verify:build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  bundle-builder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --manifest-path tools/bundle-builder/Cargo.toml -- --check
      - run: cargo test --manifest-path tools/bundle-builder/Cargo.toml
